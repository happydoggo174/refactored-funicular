<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>food social</title>
    <link href="style.css" rel="stylesheet"></link>
    <script src="pr_detail.js" type="module"></script>
    <link rel="stylesheet" href="pr_detail.css">
</head>
<body>
    <section id="nav-bar" class="nav-bar">
        <div class="row">
            <button class="mobile-btn" id="menu_btn">
                <img src="image/menu.svg">
            </button>
            <button>
                <img src="image/home.svg" class="home-btn">
            </button>
        </div>
        <input type="text" placeholder="search" class="search-bar">
        <div class="row">
            <button class="nav-login-btn" onclick="window.location.href='login.html'" id="nav-login-btn">login</button>
            <span style="display: flex;align-items: center;" id="nav-username"></span>
            <img src="image/user_default.svg" alt="" id="user-profile" width="40px" max-height="100%" style="border-radius: 50%;">
        </div>
    </section>
    
    <div style="height: 50px;">
        <!--placeholder to prevent the nav bar from clipping into content-->
    </div>
    <div class="side-bar" id="side-bar">
        <button class="side-btn favorite-btn">
            favorite
            <img src="image/favorite.svg" id="favorite-img">
        </button>
        <button class="side-btn discoveries-btn">
            discoveries
            <img src="image/star.svg" id="discoveries-img">
        </button>
        <button class="side-btn" id="post-btn">
            post
            <img src="image/add.svg" id="post-img">
        </button>
    </div>
    <div class="main-content">
        <h1 id="pr-message"></h1>
        <div id="tilte-new" style="display: none;"></div>
        <div id="tags-new" style="display: none;"></div>
        <div style="display: none;" id="body-banner">body</div>
        <div id="body-div" style="display: none;">
            <div class="row" style="margin-bottom: 14px;">
                <button id="old-body-btn" class="body-btn">old</button>
                <button id="new-body-btn" class="body-btn">new</button>
            </div>
            <div id="old-body"></div>
            <div id="new-body" style="display: none;"></div>
        </div>
        <div class="btn-row">
            <button class="action-btn" id="approve-btn">approve</button>
            <button class="action-btn" id="reject-btn">reject</button>
        </div>
    </div>
</body>
</html>
