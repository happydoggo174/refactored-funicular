<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food social</title>
    <base href="https://happydoggo174.github.io/refactored-funicular/">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="account_page.css">
    <script src="account_page.js" type="module"></script>
</head>

<body>
    <section id="nav-bar" class="nav-bar">
        <div class="row">
            <button class="mobile-btn" id="menu_btn">
                <img src="image/menu.svg">
            </button>
            <button>
                <img src="image/home.svg" class="home-btn" onclick="window.location.href='index.html'">
            </button>
        </div>
        <input type="text" placeholder="search" class="search-bar">
    </section>

    <div style="height: 50px;">
        <!--placeholder to prevent the nav bar from clipping into content-->
    </div>
    <div class="side-bar" id="side-bar">
        <button class="side-btn favorite-btn">
            favorite
            <img src="image/favorite.svg" id="favorite-img">
        </button>
        <button class="side-btn discoveries-btn">
            discoveries
            <img src="image/star.svg" id="discoveries-img">
        </button>
        <button class="side-btn" id="post-btn">
            post
            <img src="image/add.svg" id="post-img">
        </button>
    </div>
    <div class="main-content">
        <div class="id-card">
            <img src="" id="user-profile-big" max-height="100%">
            <div id="card-info">
                <div class="row" style="width: 100%;">
                    <div style="display: flex;flex-direction: column;flex-grow: 1;width: 100%;">
                        <div id="username-edit"></div>
                        <div class="row" style="justify-content: space-between;" id="username-container">
                            <h1 id="username"></h1>
                            <button style="border-radius: 50%;padding: 8px;" id="change-username-btn">
                                <img src="image/edit.svg" alt="">
                            </button>
                        </div>
                        <div id="pass-container"></div>
                        <button id="change-password-btn">
                            change password
                            <img src="image/lock.svg" alt="" id="lock-icon">
                        </button>
                    </div>
                </div>
                <div>
                    <span class="stats-banner">stats</span>
                    <div class="stats-row" id="stats-row">
                        <span>? likes</span>
                        <span>? dislikes</span>
                        <span>? posts</span>
                        <span>? comments</span>
                    </div>
                </div>
                <div>
                    <div class="row">
                        <span class="description-banner">Description</span>
                        <div id="description-edit-div"></div>
                        <button style="border-radius: 50%;padding: 8px;" id="change-description-btn">
                            <img src="image/edit.svg" alt="">
                        </button>
                    </div>
                    <div class="description-content" id="description-content">loading,please wait...</div>
                    <textarea id="description-field" style="display: none;" class="description-content"></textarea>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
